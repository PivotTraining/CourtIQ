<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad)" />

  <!-- Basketball seams (simplified, iconic) -->
  <path d="M256 16 C256 16 256 496 256 496" stroke="white" stroke-width="6" stroke-opacity="0.25" stroke-linecap="round"/>
  <path d="M16 256 C16 256 496 256 496 256" stroke="white" stroke-width="6" stroke-opacity="0.25" stroke-linecap="round"/>
  <path d="M80 80 C160 160 160 352 80 432" stroke="white" stroke-width="6" stroke-opacity="0.2" stroke-linecap="round" fill="none"/>
  <path d="M432 80 C352 160 352 352 432 432" stroke="white" stroke-width="6" stroke-opacity="0.2" stroke-linecap="round" fill="none"/>

  <!-- Brain/IQ circuit lines (the intelligence overlay) -->
  <g stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9">
    <!-- Left hemisphere circuits -->
    <path d="M160 200 L160 170 Q160 150 180 150 L210 150"/>
    <circle cx="210" cy="150" r="6" fill="white"/>
    <path d="M140 256 L170 256 Q190 256 190 236 L190 220"/>
    <circle cx="190" cy="220" r="6" fill="white"/>
    <path d="M160 312 L180 312 Q200 312 200 292 L200 280"/>
    <circle cx="200" cy="280" r="6" fill="white"/>

    <!-- Right hemisphere circuits -->
    <path d="M352 200 L352 170 Q352 150 332 150 L302 150"/>
    <circle cx="302" cy="150" r="6" fill="white"/>
    <path d="M372 256 L342 256 Q322 256 322 236 L322 220"/>
    <circle cx="322" cy="220" r="6" fill="white"/>
    <path d="M352 312 L332 312 Q312 312 312 292 L312 280"/>
    <circle cx="312" cy="280" r="6" fill="white"/>

    <!-- Center connection (the "IQ" core) -->
    <path d="M210 150 L302 150"/>
    <path d="M190 220 L256 200 L322 220"/>
    <path d="M200 280 L256 300 L312 280"/>
    <circle cx="256" cy="200" r="8" fill="white"/>
    <circle cx="256" cy="300" r="8" fill="white"/>
    <path d="M256 200 L256 300" stroke-dasharray="8 6"/>
  </g>

  <!-- "IQ" text mark -->
  <text x="256" y="410" text-anchor="middle" fill="white" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="900" letter-spacing="-2" opacity="0.95">IQ</text>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#E85A2A"/>
    </linearGradient>
  </defs>
</svg>
